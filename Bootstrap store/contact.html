<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Store - Contact Us</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Animate.css CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- NAVBAR (Active page class swapped to Contact) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechNook</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-expand navbar-nav ms-auto gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTACT FORM SECTION -->
    <main class="flex-grow-1 my-5 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow p-4 border-0 animate__animated animate__zoomIn">
                        <h2 class="text-center mb-4">Get In Touch</h2>
                        
                        <form>
                            <!-- Name Input Row -->
                            <div class="mb-3">
                                <label for="userName" class="form-label fw-semibold">Full Name</label>
                                <input type="text" class="form-control" id="userName" placeholder="John Doe" required>
                            </div>

                            <!-- Email Input Row -->
                            <div class="mb-3">
                                <label for="userEmail" class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-control" id="userEmail" placeholder="name@example.com" required>
                            </div>

                            <!-- Message Textarea -->
                            <div class="mb-4">
                                <label for="userMessage" class="form-label fw-semibold">Your Message</label>
                                <textarea class="form-control" id="userMessage" rows="5" placeholder="How can we help you today?" required></textarea>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Bootstrap Store. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
